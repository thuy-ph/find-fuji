<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="60%">
      <stop offset="0%"  stop-color="#1c140a"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </radialGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a4a6b"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5ede0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f5ede0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>

  <!-- Subtle red glow behind peak -->
  <ellipse cx="50" cy="42" rx="28" ry="20" fill="#c0392b" opacity="0.12"/>

  <!-- Mountain body -->
  <path d="M8 88 L50 16 L92 88Z" fill="url(#mtn)"/>

  <!-- Snow cap -->
  <path d="M50 16 L38 38 L50 34 L62 38Z" fill="url(#snow)"/>

  <!-- Thin gold base line -->
  <line x1="8" y1="88" x2="92" y2="88" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
</svg>